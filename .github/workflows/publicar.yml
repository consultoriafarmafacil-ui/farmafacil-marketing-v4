name: Publicar Post Instagram

on:
  repository_dispatch:
    types: [publicar_post]
  workflow_dispatch:
    inputs:
      dia:
        description: 'Dia do post (número)'
        required: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Instalar dependências (sem baixar Chromium)
        run: |
          cd automacoes
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install

      - name: Renderizar e publicar slides
        run: |
          DIA="${{ github.event.client_payload.dia || github.event.inputs.dia }}"
          cd automacoes && node publicar.js --dia $DIA
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: true
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Commit slides gerados
        run: |
          git config user.name "Farma Fácil Bot"
          git config user.email "bot@farmafacil.com"
          git add slides/
          git diff --staged --quiet || git commit -m "auto: slides dia ${{ github.event.client_payload.dia }}"
          git push
